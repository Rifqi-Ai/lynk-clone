name: E2E Tests

on:
    pull_request:
        paths:
            - 'app/**'
            - 'routes/**'
            - 'resources/**'
            - 'database/**'
            - 'e2e/**'
            - 'playwright.config.ts'
            - 'package.json'
            - 'package-lock.json'
            - '.github/workflows/e2e.yml'
    push:
        branches: [main]
        paths:
            - 'app/**'
            - 'routes/**'
            - 'resources/**'
            - 'database/**'
            - 'e2e/**'
            - 'playwright.config.ts'

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
    group: e2e-${{ github.ref }}
    cancel-in-progress: true

jobs:
    e2e:
        name: Playwright E2E (chromium)
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, sqlite, pdo_sqlite, bcmath
                  coverage: none

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Setup problem matchers
              run: echo "::add-matcher::${{ runner.tool_cache }}/playwright/.github/problem-matchers/playwright.json"

            - name: Install PHP dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Install Node dependencies
              run: npm ci

            - name: Build frontend assets
              run: npm run build

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playwright tests
              env:
                  APP_ENV: testing
              run: npx playwright test

            - name: Upload Playwright Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-test-results
                  path: test-results/
                  retention-days: 3
